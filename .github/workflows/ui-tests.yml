name: UI Tests (Manual)

on:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  ui-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Xvfb for UI tests
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxss1
          # Handle libasound2 naming change in Ubuntu 24.04 (noble)
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Run UI tests
        run: xvfb-run -a npm run test:ui
